# Docker Compose 环境配置
spring:
  application:
    name: fanclub-vup-docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fanclub_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/pgsql

  docker:
    compose:
      file: compose.yaml
      enabled: true
      lifecycle-management: ${DOCKER_LIFECYCLE:start_only}
  ai:
    openai:
      base-url: https://ark.cn-beijing.volces.com/api/v3
      api-key: ${ARK_API_KEY}
      chat:
        options:
          model: doubao-seed-2-0-pro-260215
        completions-path: /chat/completions

jimmer:
  language: kotlin
  show-sql: true
  pretty-sql: true
  inline-sql-variables: true
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect

logging:
  level:
    llh: debug
#    org.springframework.ai: DEBUG
    org.springframework.web: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Bilibili Live SDK 配置
fanclub:
  bili:
    scraper:
      current-bid: 1111
