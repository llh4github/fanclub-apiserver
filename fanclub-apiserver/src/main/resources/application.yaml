spring:
  application:
    name: ${FANCLUB_APP_NAME:fanclub-vup}
    version: @project.version@
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fanclub_dev}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
  docker:
    compose:
      file: compose.yaml
      enabled: ${DOCKER_COMPOSE_ENABLED:true}
      lifecycle-management: ${DOCKER_LIFECYCLE:start_only}

jimmer:
  language: kotlin
  show-sql: ${FANCLUB_SHOW_SQL:false}
  pretty-sql: ${FANCLUB_SHOW_SQL:false}
  inline-sql-variables: ${FANCLUB_SHOW_SQL:false}


logging:
  level:
    llh: ${FANCLUB_LOG_LEVEL:INFO}
    org.springframework.web: WARN

springdoc:
  api-docs:
    enabled: ${FANCLUB_SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${FANCLUB_SWAGGER_ENABLED:false}
